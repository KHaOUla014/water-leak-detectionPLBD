<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom - Tableau de Bord IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 40px;
            color: #333;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5em;
            color: #2c3e50;
        }
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px; /* Bords très arrondis */
            padding: 30px;
            width: 250px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .card:hover {
            transform: translateY(-10px);
        }
        .status-indicator {
            width: 80px;
            height: 80px;
            border-radius: 50%; /* Indicateur parfaitement rond */
            margin: 0 auto 20px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.1);
        }
        .sector-name {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .ilp-value {
            font-size: 1.1em;
            color: #7f8c8d;
        }
        .action-btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 20px; /* Bouton arrondi */
            background-color: #34495e;
            color: white;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: background 0.3s;
        }
        .action-btn:hover {
            background-color: #2c3e50;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Analyse Prédictive Doom 🌊</h1>
        <p>Surveillance du réseau d'eau en temps réel</p>
    </div>

    <div class="dashboard" id="dashboard">
        </div>

    <script>
        async function fetchDiagnostic() {
            const response = await fetch('/api/diagnostic');
            const data = await response.json();
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';

            data.forEach(sector => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Si le statut est Rouge, on propose d'envoyer Orby
                const actionButton = sector.statut === "Fuite Probable" 
                    ? `<button class="action-btn" onclick="alert('Déploiement de Orby dans le ${sector.secteur} initié !')">Envoyer Orby 🤖</button>` 
                    : `<div style="height: 40px;"></div>`;

                card.innerHTML = `
                    <div class="status-indicator" style="background-color: ${sector.couleur};"></div>
                    <div class="sector-name">${sector.secteur}</div>
                    <div class="ilp-value">ILP: ${sector.ilp_actuel} m³/km/j</div>
                    <div style="color: ${sector.couleur}; font-weight: 600; margin-top: 10px;">${sector.statut}</div>
                    ${actionButton}
                `;
                dashboard.appendChild(card);
            });
        }

        // Charger les données au démarrage
        fetchDiagnostic();
        // Optionnel : Actualiser toutes les X secondes pour un vrai "temps réel"
        // setInterval(fetchDiagnostic, 10000); 
    </script>
</body>
</html>
